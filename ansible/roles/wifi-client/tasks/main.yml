---
# Unblock WiFi radio (rfkill may block it on first boot)
- name: Unblock WiFi with rfkill
  command: rfkill unblock wifi
  changed_when: false

# Rede de seguranca ANTES de tirar a wlan0 do NM: um perfil de fallback com as
# credenciais do uplink. Dormente enquanto a wlan0 esta unmanaged; no rollback
# o NM reassume a wlan0 e reconecta por ele. Sem isso, um rollback pode devolver
# a wlan0 a um NM sem credencial nenhuma -> Pi orfao (incidente 2026-07-14).
- name: Deploy perfil NM de fallback do uplink
  template:
    src: uplink-fallback.nmconnection.j2
    dest: /etc/NetworkManager/system-connections/uplink-fallback.nmconnection
    mode: "0600"
    owner: root
    group: root
  notify: Reload NetworkManager

# Mantem o NetworkManager longe do radio; eth0 fica no NM (uplink ethernet).
- name: Keep NetworkManager away from wlan0/uap0
  copy:
    dest: /etc/NetworkManager/conf.d/99-travel-router-unmanaged.conf
    content: |
      [keyfile]
      unmanaged-devices=interface-name:{{ uplink_interface }};interface-name:{{ ap_interface }}
    mode: "0644"
  notify: Reload NetworkManager

# The distro-global wpa_supplicant.service conflicts with the per-interface one
- name: Disable global wpa_supplicant service
  systemd:
    name: wpa_supplicant
    enabled: false
  failed_when: false

# ── FONTE DA VERDADE do uplink (SSID/senha/banda). BOOTSTRAP-ONLY: semeado do
#    config.yml so na 1a provisao; depois quem manda e o webapp (grava aqui e
#    reinicia). force: uplink_reset=true forca reset pelo config.yml.
- name: Diretorio de estado do travel-router
  file:
    path: /var/lib/travel-router
    state: directory
    mode: "0755"

- name: Semear uplink.conf (fonte da verdade do uplink)
  template:
    src: uplink.conf.j2
    dest: /var/lib/travel-router/uplink.conf
    mode: "0600"
    force: "{{ uplink_reset | default(false) | bool }}"

# ── Orquestrador: sobe a STA, descobre o canal e fixa o hostapd.conf ANTES do
#    hostapd subir. Radio unico: reiniciar hostapd com a STA ativa trava a
#    firmware (-52), entao o AP sobe UMA vez ja no canal certo e nunca reinicia.
- name: Deploy do orquestrador de uplink (canal-no-boot)
  template:
    src: travel-router-uplink-up.sh.j2
    dest: /usr/local/sbin/travel-router-uplink-up.sh
    mode: "0755"

- name: Deploy do servico do orquestrador de uplink
  template:
    src: travel-router-uplink.service.j2
    dest: /etc/systemd/system/travel-router-uplink.service
    mode: "0644"
  notify: Reload systemd

- name: Habilitar o orquestrador de uplink
  systemd:
    name: travel-router-uplink.service
    enabled: true
    daemon_reload: true

# wpa_supplicant@wlan0: habilitado, mas quem faz o start/regenera o conf e o
# orquestrador (start precoce com conf velho ou wlan0 no NM deixa o daemon capenga).
- name: Enable wpa_supplicant for wlan0
  systemd:
    name: "wpa_supplicant@{{ uplink_interface }}"
    enabled: true

# Cria a interface de AP virtual uap0 sobre a wlan0 (antes do hostapd)
- name: Deploy uap0-create systemd service
  template:
    src: uap0-create.service.j2
    dest: /etc/systemd/system/uap0-create.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart uap0-create

- name: Enable uap0-create service
  systemd:
    name: uap0-create
    enabled: true
    daemon_reload: true

# systemd-networkd: DHCP na wlan0 para o IP do hotel
- name: Deploy systemd-networkd config for wlan0
  copy:
    dest: /etc/systemd/network/20-wlan0.network
    content: |
      [Match]
      Name={{ uplink_interface }}

      [Network]
      DHCP=yes
    mode: "0644"
  notify: Restart systemd-networkd

- name: Enable systemd-networkd
  systemd:
    name: systemd-networkd
    enabled: true
    state: started

# ── Cutover do apply = rodar o orquestrador ───────────────────────────────────
# Em vez de restart de handlers condicionados a "changed" (fragil apos rollback),
# roda o orquestrador de forma incondicional: solta a wlan0 do NM, sobe a STA,
# espera associar e fixa o canal do hostapd. Mesmo procedimento do boot.
- name: Aplicar handlers pendentes agora (Reload NM etc.)
  meta: flush_handlers

- name: Garantir wlan0 fora do NM em runtime
  command: nmcli device set {{ uplink_interface }} managed no
  changed_when: false
  failed_when: false

- name: Rodar o orquestrador de uplink (sobe STA + fixa canal do AP)
  command: /usr/local/sbin/travel-router-uplink-up.sh
  changed_when: false

- name: Checkpoint - aguardar o uplink obter IPv4 (ate 90s)
  command: ip -4 -br addr show {{ uplink_interface }}
  register: tr_uplink_ip
  until: tr_uplink_ip.stdout is search('\d+\.\d+\.\d+\.\d+')
  retries: 30
  delay: 3
  changed_when: false
  failed_when: false
