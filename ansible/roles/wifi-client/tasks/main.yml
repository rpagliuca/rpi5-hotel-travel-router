---
# Unblock WiFi radio (rfkill may block it on first boot)
- name: Unblock WiFi with rfkill
  command: rfkill unblock wifi
  changed_when: false

# Rede de seguranca ANTES de tirar a wlan0 do NM: um perfil de fallback com as
# credenciais do uplink. Dormente enquanto a wlan0 esta unmanaged; no rollback
# o NM reassume a wlan0 e reconecta por ele. Sem isso, um rollback pode devolver
# a wlan0 a um NM sem credencial nenhuma -> Pi orfao (incidente 2026-07-14).
# BOOTSTRAP-ONLY (force: uplink_reset): o webapp e a fonte da verdade do uplink
# e reescreve este perfil ao trocar de rede; o apply nao sobrepoe a escolha.
- name: Deploy perfil NM de fallback do uplink
  template:
    src: uplink-fallback.nmconnection.j2
    dest: /etc/NetworkManager/system-connections/uplink-fallback.nmconnection
    mode: "0600"
    owner: root
    group: root
    force: "{{ uplink_reset | default(false) | bool }}"
  notify: Reload NetworkManager

# Raspberry Pi OS Bookworm manages interfaces with NetworkManager by default.
# Keep it away from the radio; eth0 stays under NM (works as ethernet uplink
# out of the box — Tailscale rides over whichever uplink is active).
- name: Keep NetworkManager away from wlan0/uap0
  copy:
    dest: /etc/NetworkManager/conf.d/99-travel-router-unmanaged.conf
    content: |
      [keyfile]
      unmanaged-devices=interface-name:{{ uplink_interface }};interface-name:{{ ap_interface }}
    mode: "0644"
  notify: Reload NetworkManager

# The distro-global wpa_supplicant.service conflicts with the per-interface one
- name: Disable global wpa_supplicant service
  systemd:
    name: wpa_supplicant
    enabled: false
  failed_when: false

# wpa_supplicant config do uplink — BOOTSTRAP-ONLY (force: uplink_reset).
# hotel_ssid/hotel_password do config.yml valem so na primeira provisao; depois
# a escolha feita no webapp persiste atraves de applies (nunca mais "voltar
# pro hotspot do iphone" sem querer). Para resetar pelo config.yml:
#   ansible-playbook ... -e uplink_reset=true
- name: Deploy wpa_supplicant config for wlan0
  template:
    src: wpa_supplicant-wlan0.conf.j2
    dest: /etc/wpa_supplicant/wpa_supplicant-{{ uplink_interface }}.conf
    mode: "0600"
    force: "{{ uplink_reset | default(false) | bool }}"
  notify: Restart wpa_supplicant

# So habilita aqui; o start acontece no cutover deterministico do final da
# role (iniciar agora, com a wlan0 ainda no NM, deixa o daemon capenga).
- name: Enable wpa_supplicant for wlan0
  systemd:
    name: "wpa_supplicant@{{ uplink_interface }}"
    enabled: true

# Systemd service to create the virtual AP interface (uap0) over wlan0
- name: Deploy uap0-create systemd service
  template:
    src: uap0-create.service.j2
    dest: /etc/systemd/system/uap0-create.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart uap0-create

- name: Enable uap0-create service
  systemd:
    name: uap0-create
    enabled: true
    daemon_reload: true

# systemd-networkd: DHCP on wlan0 for the hotel WiFi IP
- name: Deploy systemd-networkd config for wlan0
  copy:
    dest: /etc/systemd/network/20-wlan0.network
    content: |
      [Match]
      Name={{ uplink_interface }}

      [Network]
      DHCP=yes
    mode: "0644"
  notify: Restart systemd-networkd

- name: Enable systemd-networkd
  systemd:
    name: systemd-networkd
    enabled: true
    state: started

# ── Cutover deterministico do uplink ──────────────────────────────────────────
# NAO depender de handlers condicionados a "changed": apos um rollback os
# configs podem estar identicos e nenhum handler dispara — a wlan0 fica no
# limbo (NM solta no reload final, wpa_supplicant morto do start precoce) e o
# Pi cai offline ate o deadman agir (incidente 2026-07-14). A sequencia abaixo
# reproduz o cutover manual que funciona: soltar a wlan0 do NM em runtime,
# restart LIMPO do wpa_supplicant e do networkd, e um checkpoint que so deixa
# o play continuar com o uplink de pe.

- name: Aplicar handlers pendentes agora (Reload NM etc.)
  meta: flush_handlers

- name: Garantir wlan0 fora do NM em runtime
  command: nmcli device set {{ uplink_interface }} managed no
  changed_when: false
  failed_when: false

- name: Restart limpo do wpa_supplicant do uplink
  systemd:
    name: "wpa_supplicant@{{ uplink_interface }}"
    state: restarted

- name: Restart do systemd-networkd
  systemd:
    name: systemd-networkd
    state: restarted

- name: Checkpoint - aguardar o uplink obter IPv4 (ate 90s)
  command: ip -4 -br addr show {{ uplink_interface }}
  register: tr_uplink_ip
  until: tr_uplink_ip.stdout is search('\d+\.\d+\.\d+\.\d+')
  retries: 30
  delay: 3
  changed_when: false
