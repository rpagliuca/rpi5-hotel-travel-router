---
# Unblock WiFi radio (rfkill may block it on first boot)
- name: Unblock WiFi with rfkill
  command: rfkill unblock wifi
  changed_when: false

# Raspberry Pi OS Bookworm manages interfaces with NetworkManager by default.
# Keep it away from the radio; eth0 stays under NM (works as ethernet uplink
# out of the box — Tailscale rides over whichever uplink is active).
- name: Keep NetworkManager away from wlan0/uap0
  copy:
    dest: /etc/NetworkManager/conf.d/99-travel-router-unmanaged.conf
    content: |
      [keyfile]
      unmanaged-devices=interface-name:{{ uplink_interface }};interface-name:{{ ap_interface }}
    mode: "0644"
  notify: Reload NetworkManager

# The distro-global wpa_supplicant.service conflicts with the per-interface one
- name: Disable global wpa_supplicant service
  systemd:
    name: wpa_supplicant
    enabled: false
  failed_when: false

# wpa_supplicant config for hotel WiFi uplink
- name: Deploy wpa_supplicant config for wlan0
  template:
    src: wpa_supplicant-wlan0.conf.j2
    dest: /etc/wpa_supplicant/wpa_supplicant-{{ uplink_interface }}.conf
    mode: "0600"
  notify: Restart wpa_supplicant

- name: Enable wpa_supplicant for wlan0
  systemd:
    name: "wpa_supplicant@{{ uplink_interface }}"
    enabled: true
    state: started

# Systemd service to create the virtual AP interface (uap0) over wlan0
- name: Deploy uap0-create systemd service
  template:
    src: uap0-create.service.j2
    dest: /etc/systemd/system/uap0-create.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart uap0-create

- name: Enable uap0-create service
  systemd:
    name: uap0-create
    enabled: true
    daemon_reload: true

# systemd-networkd: DHCP on wlan0 for the hotel WiFi IP
- name: Deploy systemd-networkd config for wlan0
  copy:
    dest: /etc/systemd/network/20-wlan0.network
    content: |
      [Match]
      Name={{ uplink_interface }}

      [Network]
      DHCP=yes
    mode: "0644"
  notify: Restart systemd-networkd

- name: Enable systemd-networkd
  systemd:
    name: systemd-networkd
    enabled: true
    state: started
