---
- name: Check if tailscale is already installed
  command: which tailscale
  register: tailscale_installed
  changed_when: false
  failed_when: false

- name: Download and run Tailscale install script
  shell: curl -fsSL https://tailscale.com/install.sh | sh
  when: tailscale_installed.rc != 0

- name: Enable and start tailscaled
  systemd:
    name: tailscaled
    enabled: true
    state: started

- name: Deploy tailscale-up service (for boot authentication + exit node)
  template:
    src: tailscale-up.service.j2
    dest: /etc/systemd/system/tailscale-up.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart tailscale-up

- name: Enable tailscale-up service
  systemd:
    name: tailscale-up
    enabled: true
    daemon_reload: true

- name: Run tailscale-up now (first provisioning)
  systemd:
    name: tailscale-up
    state: started
  ignore_errors: true

handlers:
  - name: Reload systemd
    systemd:
      daemon_reload: true

  - name: Restart tailscale-up
    systemd:
      name: tailscale-up
      state: restarted
    ignore_errors: true
