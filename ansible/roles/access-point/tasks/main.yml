---
# Unmask hostapd (it ships masked on Raspberry Pi OS)
- name: Unmask hostapd
  systemd:
    name: hostapd
    masked: false

# hostapd.conf: channel/hw_mode sao FIXADOS em runtime pelo orquestrador
# (travel-router-uplink) antes do hostapd subir. NAO notificamos restart aqui:
# reiniciar o hostapd com a STA ativa trava a firmware (-52). Mudancas de canal
# valem no proximo boot (o modelo e "grava config -> reboot").
- name: Deploy hostapd config
  template:
    src: hostapd.conf.j2
    dest: /etc/hostapd/hostapd.conf
    mode: "0600"

- name: Point hostapd to config file
  lineinfile:
    path: /etc/default/hostapd
    regexp: "^#?DAEMON_CONF"
    line: 'DAEMON_CONF="/etc/hostapd/hostapd.conf"'

# systemd-networkd: assign static IP to uap0 (the AP side)
- name: Deploy systemd-networkd config for uap0
  template:
    src: uap0.network.j2
    dest: /etc/systemd/network/10-uap0.network
    mode: "0644"
  notify: Restart systemd-networkd

# dnsmasq: DHCP + DNS for uap0 clients
- name: Deploy dnsmasq config for uap0
  template:
    src: dnsmasq-uap0.conf.j2
    dest: /etc/dnsmasq.d/uap0.conf
    mode: "0644"
  notify: Restart dnsmasq

# hostapd nao pode subir antes do uap0 existir E do orquestrador fixar o canal
- name: Create hostapd systemd drop-in directory
  file:
    path: /etc/systemd/system/hostapd.service.d
    state: directory
    mode: "0755"

# AP-FIRST (com canal certo): o hostapd sobe DEPOIS do orquestrador de uplink,
# que ja fixou channel/hw_mode. Se o orquestrador falhar/expirar, o hostapd sobe
# assim mesmo (Wants, nao Requires) no canal que estiver no conf — o AP nunca
# fica refem do uplink. Restart=always recupera crashes (start de um hostapd
# parado nao dispara o wedge; so o restart de um hostapd ATIVO trava).
- name: Harden hostapd (AP-first, canal-no-boot, auto-restart)
  copy:
    dest: /etc/systemd/system/hostapd.service.d/uap0.conf
    content: |
      [Unit]
      Requires=uap0-create.service
      After=uap0-create.service travel-router-uplink.service
      Wants=travel-router-uplink.service
      # Nunca desistir de reiniciar o AP (rate limit desligado)
      StartLimitIntervalSec=0

      [Service]
      Restart=always
      RestartSec=3
    mode: "0644"
  notify: Reload systemd

- name: Enable and start hostapd
  systemd:
    name: hostapd
    enabled: true
    state: started
    daemon_reload: true

- name: Enable and start dnsmasq
  systemd:
    name: dnsmasq
    enabled: true
    state: started

# ── Watchdog do AP: repara uap0/hostapd/IP/dnsmasq a cada minuto ──────────────
# So age quando algo esta INATIVO (start de um hostapd parado e seguro; nunca
# reinicia um hostapd ativo, que travaria a firmware).
- name: Deploy AP watchdog script
  template:
    src: ap-watchdog.sh.j2
    dest: /usr/local/bin/ap-watchdog.sh
    mode: "0755"

- name: Deploy AP watchdog service
  template:
    src: ap-watchdog.service.j2
    dest: /etc/systemd/system/ap-watchdog.service
    mode: "0644"
  notify: Reload systemd

- name: Deploy AP watchdog timer
  template:
    src: ap-watchdog.timer.j2
    dest: /etc/systemd/system/ap-watchdog.timer
    mode: "0644"
  notify: Reload systemd

- name: Enable and start AP watchdog timer
  systemd:
    name: ap-watchdog.timer
    enabled: true
    state: started
    daemon_reload: true
