---
- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 3600

- name: Upgrade all packages
  apt:
    upgrade: dist

- name: Install required packages
  apt:
    name:
      - hostapd
      - dnsmasq
      - nftables
      - wpasupplicant
      - wireless-tools
      - iw
      - rfkill
      - curl
      - git
      - vim
      - python3
      - python3-pip
    state: present

- name: Set timezone
  timezone:
    name: "{{ timezone }}"

- name: Enable IP forwarding at boot
  sysctl:
    name: "{{ item }}"
    value: "1"
    sysctl_file: /etc/sysctl.d/90-router.conf
    reload: true
  loop:
    - net.ipv4.ip_forward
    - net.ipv6.conf.all.forwarding

- name: Harden SSH — disable password auth
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PasswordAuthentication"
    line: "PasswordAuthentication no"
  notify: Restart SSH

- name: Harden SSH — disable root login
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PermitRootLogin"
    line: "PermitRootLogin no"
  notify: Restart SSH
