---
- name: RPi5 Hotel Travel Router
  hosts: rpi5
  gather_facts: true

  # Todos os valores específicos do seu ambiente vêm do config.yml (gitignored):
  #   ansible-playbook playbook.yml -e @config.yml
  # (veja config.example.yml). Sem vault: config.yml nunca é commitado.

  pre_tasks:
    - name: Validar que o config.yml foi carregado (vars obrigatórios)
      assert:
        that:
          - ap_password is defined and ap_password | length >= 8
          - hotel_ssid is defined and hotel_ssid | length > 0
          - tailscale_authkey is defined and tailscale_authkey.startswith('tskey-')
          - tailscale_exit_node is defined and tailscale_exit_node | length > 0
          - hotel_open or (hotel_password | default('') | length > 0)
        fail_msg: >-
          Config incompleto. Rode com `-e @config.yml` e preencha os campos
          obrigatorios (veja config.example.yml): ap_password (>=8), hotel_ssid,
          tailscale_authkey, tailscale_exit_node e, se hotel_open=false, hotel_password.
        quiet: true
      tags: [always]

  roles:
    # PRIMEIRO: instala os CLIs de rollback e (se deadman_rollback=true) ARMA
    # o deadman switch ANTES de qualquer mudanca de rede. Se o playbook morrer
    # no meio (ou o operador perder o acesso), o deadman reverte ao estado base.
    # Licao aprendida: como ultima role, o deadman so armava quando tudo ja
    # tinha dado certo — ou seja, exatamente quando nao era mais necessario.
    - role: rollback-guard
      tags: [rollback-guard]
    - role: base
      tags: [base]
    - role: wifi-client
      tags: [wifi-client]
    - role: access-point
      tags: [access-point]
    - role: routing
      tags: [routing]
    - role: tailscale
      tags: [tailscale]
    - role: webapp
      tags: [webapp]

  post_tasks:
    # "AP-first" como verificacao, nao so intencao: se o AP nao estiver de pe
    # ao final do apply, FALHAR de proposito — com o deadman armado, a falha
    # vira rollback automatico ao estado base em vez de um Pi inacessivel.
    - name: Validar que o AP esta no ar ao final do apply
      block:
        - name: hostapd ativo?
          command: systemctl is-active hostapd
          register: tr_hostapd_state
          changed_when: false

        - name: "{{ ap_interface }} com o IP do AP?"
          command: ip -br addr show {{ ap_interface }}
          register: tr_uap_addr
          changed_when: false
          failed_when: ap_ip not in tr_uap_addr.stdout

        - name: AP OK
          debug:
            msg: "AP no ar: hostapd={{ tr_hostapd_state.stdout }}, {{ ap_interface }}={{ ap_ip }}"
      tags: [always]
