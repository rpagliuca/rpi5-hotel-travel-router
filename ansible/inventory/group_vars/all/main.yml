---
# ── Private AP (your travel network) ──────────────────────────────────────────
ap_ssid: "RafTravel"
ap_interface: "uap0"        # virtual AP interface over onboard wlan0
ap_channel: 6               # must match uplink channel (set by hotel WiFi)
ap_subnet: "192.168.88.0/24"
ap_ip: "192.168.88.1"
ap_dhcp_start: "192.168.88.100"
ap_dhcp_end: "192.168.88.150"
ap_hw_mode: "g"             # "g" = 2.4GHz; change to "a" for 5GHz if adapter supports it

# ── Uplink (hotel WiFi client) ─────────────────────────────────────────────────
uplink_interface: "wlan0"   # onboard radio; shares channel with uap0

# ── Ethernet uplink fallback ───────────────────────────────────────────────────
eth_interface: "eth0"

# ── Tailscale ──────────────────────────────────────────────────────────────────
tailscale_hostname: "rpi5-travel-router"
# Set exit_node to the Tailscale machine name (e.g. "laptop2023") or its IP.
# Leave empty to disable automatic exit node selection.
tailscale_exit_node: "laptop2023"
tailscale_exit_node_allow_lan_access: true

# ── System ─────────────────────────────────────────────────────────────────────
timezone: "America/Sao_Paulo"
