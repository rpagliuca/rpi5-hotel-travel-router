---
# Defaults GENÉRICOS do projeto. Nada pessoal aqui — o que é específico do seu
# ambiente (SSIDs, senhas, authkey, exit node, IP do Pi) vai em config.yml
# (gitignored, veja config.example.yml) e sobrepõe estes valores via `-e @config.yml`.

# ── AP privado ────────────────────────────────────────────────────────────────
ap_ssid: "TravelRouter"     # override em config.yml
ap_interface: "uap0"        # AP virtual sobre a wlan0 onboard
ap_channel: 6               # canal DEFAULT (usado quando não há uplink associado)
ap_subnet: "192.168.88.0/24"
ap_ip: "192.168.88.1"
ap_dhcp_start: "192.168.88.100"
ap_dhcp_end: "192.168.88.150"
ap_hw_mode: "g"             # estado inicial; o orquestrador ajusta g/a conforme o canal do uplink

# ── Uplink (cliente do hotel) ─────────────────────────────────────────────────
# Rádio único: o AP acompanha o canal do uplink, fixado UMA vez no boot pelo
# orquestrador (travel-router-uplink), nunca por restart do hostapd — reiniciar
# o hostapd com o uplink ativo trava a firmware do rádio. Trocar de rede/banda
# é "grava no uplink.conf -> reboot" (via webapp).
uplink_interface: "wlan0"   # rádio onboard; compartilha canal com o uap0
hotel_open: false           # override em config.yml (true p/ redes abertas)
eth_interface: "eth0"       # uplink ethernet alternativo
# Banda do uplink: 24 = só 2.4GHz (default, mais estável) | 5 = só 5GHz | auto.
# O AP segue o canal do uplink em qualquer banda. Troque pelo webapp (com reboot).
uplink_band: "24"

# ── Tailscale ─────────────────────────────────────────────────────────────────
tailscale_hostname: "rpi5-travel-router"
tailscale_exit_node_allow_lan_access: true
# tailscale_exit_node e tailscale_authkey: obrigatórios, definidos em config.yml.

# ── Modo do roteador (captive portal) ──────────────────────────────────────────
# "secure" -> clientes saem só via Tailscale (padrão). "portal" -> direto p/ login.
# Alterna em runtime: `travel-router portal` / `travel-router secure`.
travel_router_boot_mode: "secure"

# ── Rollback / deadman switch ─────────────────────────────────────────────────
# Rede de seguranca ao aplicar remotamente: se true, ao final do playbook o Pi
# fica "armado" e reverte ao estado base (wlan0 no NetworkManager, sem AP/NAT,
# Tailscale sem exit node) caso o heartbeat nao seja tocado dentro do prazo.
# Mantenha vivo com `sudo travel-router-keepalive` e confirme com
# `sudo travel-router-commit`. Ative via `-e deadman_rollback=true`.
deadman_rollback: false
deadman_timeout_sec: 300    # 5 min sem heartbeat -> rollback

# ── Web app de configuração (servido no AP) ───────────────────────────────────
webapp_port: 80             # http://192.168.88.1
wifi_country: "BR"          # domínio regulatório usado nos configs de Wi-Fi

# ── Sistema ─────────────────────────────────────────────────────────────────────
timezone: "UTC"             # override em config.yml
