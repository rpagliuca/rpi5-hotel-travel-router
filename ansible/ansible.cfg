[defaults]
inventory         = inventory/hosts.yml
roles_path        = roles
remote_user       = pi
private_key_file  = ~/.ssh/id_ed25519
host_key_checking = false
# Create .vault_pass locally with your vault passphrase — never commit it
vault_password_file = .vault_pass

[privilege_escalation]
become        = true
become_method = sudo
become_user   = root
